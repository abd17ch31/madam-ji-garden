<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Garden</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stars"></div>
    <svg id="garden"></svg>
    <div id="grass"></div>
    <div id="lovePopup" class="love-popup" aria-live="polite">
        <div class="love-popup__card">
            I love you my jooby doovy spelling maker machine, love you so much
        </div>
    </div>

    <!-- Action buttons placed over the grass -->
    <div class="action-buttons" aria-hidden="false">
        <button id="surpriseBtn" class="surprise-btn" aria-label="Surprise button">look here's a surprise for you</button>
        <button id="openStorybookBtn" class="surprise-btn storybook-btn" aria-label="Open our storybook">open our storybook</button>
    </div>

    <!-- Temporary FPS counter for profiling -->
    <div id="fpsCounter" aria-hidden="true"></div>
    <!-- Canvas renderer (toggleable) -->
    <canvas id="gardenCanvas" style="display:none;" aria-hidden="true"></canvas>


    <script src="js/main.js"></script>
</body>
</html>
